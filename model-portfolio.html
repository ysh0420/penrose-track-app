<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Portfolio — Penrose Track</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brain-pages.css">
<link rel="stylesheet" href="/css/platform-pages.css">
<style>
:root{--navy:#1a2744;--gold:#c9a84c;--cream:#f7f5f0;--sumi:#2a2a2a;--line:#e0d8c4;--muted:#8b8680;--green:#2e7d32;--red:#b71c1c;--blue:#2563eb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--sumi);min-height:100vh;padding:2rem 1rem}
h1,h2,h3{font-family:'Cormorant Garamond',serif;color:var(--navy)}
.container{max-width:1280px;margin:0 auto}
.topbar{background:var(--navy);color:white;padding:1.5rem 2rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.topbar h1{color:white;font-size:22pt;letter-spacing:.5px}
.topbar h1 span{color:var(--gold)}
.topbar .sub{font-size:10pt;color:rgba(255,255,255,.8);font-style:italic}
.topbar-right{font-size:10pt;color:rgba(255,255,255,.85);text-align:right;display:flex;gap:1rem;align-items:center}
.topbar-right a{color:white;text-decoration:none;border-bottom:1px solid transparent;cursor:pointer}
.topbar-right a:hover{border-bottom-color:var(--gold)}
.mp-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1rem;flex-wrap:wrap}
.mp-toolbar h2{font-size:20pt;border-bottom:2px solid var(--gold);padding-bottom:.3em;display:inline-block}
.mp-toolbar small{display:block;color:var(--muted);font-size:10pt;margin-top:.35rem}
.mp-refresh{border:1px solid var(--navy);background:white;color:var(--navy);padding:.55rem .9rem;border-radius:4px;font-family:inherit;cursor:pointer}
.mp-refresh:hover{border-color:var(--gold);color:var(--gold)}
.mp-summary{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:12px;margin-bottom:1rem}
.mp-metric{background:white;border:1px solid var(--line);padding:1rem;min-height:96px}
.mp-metric .label{font-size:8.5pt;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:.45rem}
.mp-metric .value{font-family:'Cormorant Garamond',serif;font-size:20pt;color:var(--navy);line-height:1.05;white-space:nowrap}
.mp-metric .sub{font-size:9.5pt;color:var(--muted);margin-top:.45rem}
.mp-up{color:var(--green)!important}.mp-down{color:var(--red)!important}.mp-flat{color:var(--muted)!important}
.mp-grid{display:grid;grid-template-columns:minmax(0,1.7fr) minmax(320px,.9fr);gap:16px;margin-bottom:1rem}
.mp-section{background:white;border:1px solid var(--line);padding:1.25rem;margin-bottom:1rem}
.mp-section h3{font-size:16pt;margin-bottom:.8rem}
.mp-chart{width:100%;height:300px;display:block;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#fbfaf6}
.mp-chart-meta{display:flex;justify-content:space-between;color:var(--muted);font-size:9pt;margin-top:.6rem;gap:12px;flex-wrap:wrap}
.mp-table-wrap{overflow-x:auto}
.mp-table{width:100%;border-collapse:collapse}
.mp-table th,.mp-table td{padding:8px 10px;border-bottom:1px solid var(--line);font-size:10pt;text-align:left;vertical-align:top}
.mp-table th{background:var(--cream);color:var(--navy);font-size:8.5pt;text-transform:uppercase;letter-spacing:.8px}
.mp-table td.num,.mp-table th.num{text-align:right;font-variant-numeric:tabular-nums}
.mp-table tr.clickable{cursor:pointer}
.mp-table tr.clickable:hover{background:var(--cream)}
.mp-pill{display:inline-block;border:1px solid var(--line);border-radius:12px;padding:2px 8px;font-size:8.5pt;color:var(--navy);background:#fbfaf6;white-space:nowrap}
.mp-research-link{color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(37,99,235,.35);font-weight:600;white-space:nowrap}
.mp-research-link:hover{border-bottom-color:var(--blue)}
.mp-action-buy,.mp-action-add,.mp-action-replace_in{color:var(--green);font-weight:600}
.mp-action-trim,.mp-action-sell,.mp-action-replace_out{color:var(--red);font-weight:600}
.mp-risk-list{display:grid;gap:8px}
.mp-risk-row{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding-bottom:8px;font-size:10pt}
.mp-risk-row span:first-child{color:var(--muted)}
.mp-note{font-size:10pt;line-height:1.5;color:var(--sumi);border-left:3px solid var(--gold);padding-left:12px;margin-top:8px}
.mp-ai-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:.8rem}
.mp-ai-head h3{margin-bottom:.25rem}
.mp-ai-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:9.5pt;color:var(--muted)}
.mp-ai-meta a{color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(37,99,235,.35)}
.mp-ai-counts{display:flex;gap:8px;flex-wrap:wrap}
.mp-ai-count{border:1px solid var(--line);background:#fbfaf6;padding:6px 9px;font-size:9pt;color:var(--navy);font-variant-numeric:tabular-nums}
.mp-ai-table-wrap{max-height:620px;overflow:auto;scrollbar-gutter:stable;border:1px solid var(--line);background:white}
.mp-ai-sheet{min-width:1320px;border-collapse:separate;border-spacing:0}
.mp-ai-sheet th,.mp-ai-sheet td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 8px;font-size:9.5pt;line-height:1.25;white-space:nowrap}
.mp-ai-sheet th{position:sticky;top:0;z-index:2;background:#f0eadc;color:var(--navy);box-shadow:0 1px 0 var(--line)}
.mp-ai-sheet tr:nth-child(even) td{background:#fbfaf6}
.mp-ai-sheet tr:hover td{background:#f4f0e6}
.mp-ai-sheet td:first-child,.mp-ai-sheet th:first-child{border-left:0}
.mp-ai-rank{color:var(--muted);font-variant-numeric:tabular-nums}
.mp-ai-side{font-weight:700;text-transform:uppercase;font-size:8pt;letter-spacing:.8px}
.mp-ai-side-long{color:var(--green)}
.mp-ai-side-short{color:var(--red)}
.mp-ai-side-watch{color:var(--muted)}
.mp-ai-decision{font-size:8.5pt;color:var(--navy);text-transform:uppercase;letter-spacing:.4px}
.mp-rag-green{color:var(--green);font-weight:700}.mp-rag-amber{color:#b7791f;font-weight:700}.mp-rag-red{color:var(--red);font-weight:700}
.mp-tags{min-width:260px;max-width:360px;color:var(--muted);font-size:9pt;line-height:1.35;white-space:normal!important}
@media(max-width:1020px){.mp-summary{grid-template-columns:repeat(3,1fr)}.mp-grid{grid-template-columns:1fr}}
@media(max-width:640px){body{padding:1rem .75rem}.topbar{padding:1rem}.mp-summary{grid-template-columns:1fr 1fr}.mp-metric .value{font-size:17pt}.mp-chart{height:220px}}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
<div><h1>Penrose <span>Japan</span></h1><div class="sub">USD100M model book</div></div>
<div class="topbar-right"><span id="brain-user-email"></span><a id="brain-signout" href="#">Sign out</a></div>
</div>

<div data-platform-nav data-active-nav="track"></div>

<div id="brain-login"></div>

<div id="brain-app" style="display:none">
  <div class="mp-toolbar">
    <div>
      <h2>Penrose Brain Model Book</h2>
      <small id="mp-subtitle">Loading portfolio state…</small>
    </div>
    <button id="mp-refresh" class="mp-refresh" type="button">Refresh</button>
  </div>

  <div id="mp-summary" class="mp-summary"></div>

  <section class="mp-section">
    <div class="mp-ai-head">
      <div>
        <h3>AI Screening Preview</h3>
        <div id="mp-ai-meta" class="mp-ai-meta"></div>
      </div>
      <div id="mp-ai-counts" class="mp-ai-counts"></div>
    </div>
    <div id="mp-ai-preview"></div>
  </section>

  <div class="mp-grid">
    <div>
      <section class="mp-section">
        <h3>NAV Track Record</h3>
        <div id="mp-chart"></div>
      </section>

      <section class="mp-section">
        <h3>Current Positions</h3>
        <div id="mp-positions"></div>
      </section>
    </div>

    <div>
      <section class="mp-section">
        <h3>Risk Snapshot</h3>
        <div id="mp-risk"></div>
      </section>

      <section class="mp-section">
        <h3>Deck Metrics</h3>
        <div id="mp-deck"></div>
      </section>
    </div>
  </div>

  <section class="mp-section">
    <h3>Recent Rebalance Log</h3>
    <div id="mp-trades"></div>
  </section>
</div>

</div>
<script type="module" src="/js/platform-nav.js"></script>
<script type="module" src="/js/page-model-portfolio.js"></script>
</body>
</html>
